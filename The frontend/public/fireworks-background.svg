      <path class="trail thin" stroke="url(#blueTrail)" d="M0 0 C126 -6 252 -32 388 -104"/>
      <path class="trail thin" stroke="url(#whiteTrail)" d="M0 0 C-77 94 -160 175 -294 232"/>
      <path class="trail thin" stroke="url(#goldTrail)" d="M0 0 C-146 -8 -278 -4 -430 52"/>
    </g>

    <g transform="translate(1110 245) rotate(10)">
      <circle r="42" fill="url(#goldCore)" opacity=".6"/>
      <path class="trail" stroke="url(#blueTrail)" d="M0 0 C-18 -105 -35 -208 -112 -300"/>
      <path class="trail" stroke="url(#whiteTrail)" d="M0 0 C58 -104 133 -185 250 -250"/>
      <path class="trail" stroke="url(#blueTrail)" d="M0 0 C112 -32 224 -44 345 -20"/>
      <path class="trail" stroke="url(#redTrail)" d="M0 0 C-94 -66 -205 -98 -338 -112"/>
      <path class="trail" stroke="url(#whiteTrail)" d="M0 0 C-112 4 -230 20 -340 84"/>
      <path class="trail" stroke="url(#blueTrail)" d="M0 0 C74 74 152 138 265 192"/>
      <path class="trail thin" stroke="url(#redTrail)" d="M0 0 C25 -142 72 -255 178 -344"/>
      <path class="trail thin" stroke="url(#whiteTrail)" d="M0 0 C-52 112 -119 212 -226 310"/>
      <path class="trail thin" stroke="url(#blueTrail)" d="M0 0 C142 30 268 70 390 154"/>
    </g>

    <g transform="translate(1280 525) rotate(18)">
      <circle r="46" fill="url(#goldCore)" opacity=".62"/>
      <path class="trail" stroke="url(#goldTrail)" d="M0 0 C-86 -82 -170 -134 -290 -166"/>
      <path class="trail" stroke="url(#redTrail)" d="M0 0 C32 -106 78 -193 170 -278"/>
      <path class="trail" stroke="url(#blueTrail)" d="M0 0 C110 -50 210 -88 342 -110"/>
      <path class="trail" stroke="url(#goldTrail)" d="M0 0 C118 38 214 96 310 190"/>
      <path class="trail" stroke="url(#whiteTrail)" d="M0 0 C-42 108 -92 202 -188 288"/>
      <path class="trail thin" stroke="url(#redTrail)" d="M0 0 C-116 10 -232 38 -365 116"/>
