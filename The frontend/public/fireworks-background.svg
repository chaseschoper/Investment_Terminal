      <path class="trail thin" stroke="url(#whiteTrail)" d="M0 0 C-8 -126 -38 -232 -112 -336"/>
    </g>

    <g transform="translate(520 730) rotate(-8)">
      <circle r="35" fill="url(#goldCore)" opacity=".65"/>
      <path class="trail" stroke="url(#redTrail)" d="M0 0 C-70 -76 -142 -130 -240 -168"/>
      <path class="trail" stroke="url(#blueTrail)" d="M0 0 C-18 -108 -20 -205 30 -312"/>
      <path class="trail" stroke="url(#goldTrail)" d="M0 0 C94 -62 176 -128 252 -228"/>
      <path class="trail" stroke="url(#whiteTrail)" d="M0 0 C112 2 214 34 318 106"/>
      <path class="trail thin" stroke="url(#redTrail)" d="M0 0 C-118 44 -224 98 -315 180"/>
      <path class="trail thin" stroke="url(#goldTrail)" d="M0 0 C42 90 68 178 64 284"/>
    </g>
  </g>

  <g class="spark">
    <circle cx="246" cy="258" r="2.4" fill="#ff6b6b"/>
    <circle cx="326" cy="174" r="1.8" fill="#9cc9ff"/>
    <circle cx="740" cy="310" r="2" fill="#ffffff"/>
    <circle cx="1014" cy="124" r="2.6" fill="#ffce5c"/>
    <circle cx="1348" cy="322" r="2.3" fill="#ff5c7a"/>
    <circle cx="1450" cy="654" r="2.8" fill="#ffffff"/>
    <circle cx="1115" cy="825" r="2" fill="#83b7ff"/>
    <circle cx="700" cy="820" r="2.2" fill="#ff6b6b"/>
    <circle cx="320" cy="862" r="2" fill="#ffe477"/>
    <circle cx="95" cy="520" r="1.8" fill="#ffffff"/>
  </g>
</svg>
